<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>tIDl — Search Results</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600&display=swap" />
  <link rel="stylesheet" href="results.css" />
</head>
<body>
  <header>
    <span class="logo">tIDl</span>
    <span id="query-label" class="query"></span>
  </header>

  <div id="state-loading" class="state">
    <div class="waveform"><span></span><span></span><span></span><span></span><span></span></div>
    <p>Searching…</p>
  </div>

  <div id="state-empty" class="state hidden">
    <p>No tracks found.</p>
  </div>

  <div id="state-error" class="state hidden">
    <p id="error-message">Something went wrong.</p>
    <button id="settings-btn" class="hidden">Open Settings</button>
  </div>

  <ul id="results-list" class="hidden"></ul>

  <!-- Playlist picker dropdown (shared, repositioned on use) -->
  <div id="playlist-picker" class="hidden">
    <div class="picker-header">Add to playlist</div>
    <ul id="playlist-list"></ul>
  </div>

  <script src="results.js"></script>
</body>
</html>
