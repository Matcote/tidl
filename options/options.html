<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>tIDl — Settings</title>
  <link rel="stylesheet" href="options.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1>tIDl</h1>
      <p class="subtitle">Connect your Tidal account to start identifying music.</p>
    </header>

    <section class="card">
      <h2>Tidal Account</h2>
      <div id="status-connected" class="status hidden">
        <span class="dot connected"></span>
        Connected as <strong id="username"></strong>
        <button id="disconnect" class="secondary">Disconnect</button>
      </div>
      <div id="status-disconnected" class="status">
        <span class="dot disconnected"></span>
        Not connected
      </div>
      <button id="connect-btn" class="primary">Connect to Tidal</button>
    </section>

    <section class="card">
      <h2>Behavior</h2>
      <label class="toggle-row">
        <div class="toggle-info">
          <span class="toggle-label">Popup on text selection</span>
          <span class="toggle-desc">Show a "Search Tidal" button whenever you highlight text on any page.</span>
        </div>
        <div class="toggle-switch">
          <input type="checkbox" id="selection-popup-toggle" checked />
          <span class="slider"></span>
        </div>
      </label>
    </section>

    <p class="message hidden" id="message"></p>
  </div>
  <script src="options.js"></script>
</body>
</html>
